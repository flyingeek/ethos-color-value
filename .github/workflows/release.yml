name: Release

on:
  push:
    tags:
      - 'release/*'

jobs:

  build:

    runs-on: ubuntu-latest
    env:
      GIT_VER: ''
      GIT_TAG: ''
      GH_TYPE: ''

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Set build variables
      run: |
        GIT_VER=${GITHUB_REF##*/}
        GIT_TAG=${GITHUB_REF##refs/tags/}
        if [[ ${GIT_VER} =~ ^[0-9]+[.][0-9]+[.][0-9]+[-][A-Za-z0-9.-]+ ]]
        then
          GH_TYPE='Release Candidate'
        else
          GH_TYPE='Release'
        fi
        echo "GIT_VER=${GIT_VER}" >> ${GITHUB_ENV}
        echo "GIT_TAG=${GIT_TAG}" >> ${GITHUB_ENV}
        echo "GH_TYPE=${GH_TYPE}" >> ${GITHUB_ENV}
        cat ${GITHUB_ENV}

    - name: Verify version consistency
      run: |
        MD_VER=$(grep -m 1 "^# " Releases.md | sed 's/^# //')
        MANIFEST_VER=$(python3 -c "import json; print(json.load(open('ethos_lua_manifest.json'))['version'])")
        SCRIPT_VER=$(grep -m 1 'local scriptVersion' color-value/main.lua | sed 's/.*"\(.*\)".*/\1/')
        echo "Tag version      : ${{ env.GIT_VER }}"
        echo "Releases.md      : ${MD_VER}"
        echo "Manifest version : ${MANIFEST_VER}"
        echo "scriptVersion    : ${SCRIPT_VER}"
        FAIL=0
        if [[ "${MD_VER}" != "${{ env.GIT_VER }}" ]]; then
          echo "::error::Releases.md version (${MD_VER}) does not match tag (${{ env.GIT_VER }})"
          FAIL=1
        fi
        if [[ "${MANIFEST_VER}" != "${{ env.GIT_VER }}" ]]; then
          echo "::error::ethos_lua_manifest.json version (${MANIFEST_VER}) does not match tag (${{ env.GIT_VER }})"
          FAIL=1
        fi
        if [[ "${SCRIPT_VER}" != "${{ env.GIT_VER }}" ]]; then
          echo "::error::scriptVersion in main.lua (${SCRIPT_VER}) does not match tag (${{ env.GIT_VER }})"
          FAIL=1
        fi
        exit ${FAIL}

    - name: Make release package
      run: |
          zip -q -r "ethos-color-value-${{ env.GIT_VER }}.zip" color-value* ethos_lua_manifest.json
          echo '{"version":"${{ env.GIT_VER }}"}' > version.json

    - name: Create Release
      run: |
        python3 .github/scripts/extract-release-notes.py "${{ env.GIT_VER }}" Releases.md > Notes.md
        gh release create "${{ env.GIT_TAG }}" \
          --notes-file Notes.md \
          --title "Color Value Lua Widget for Ethos - ${{ env.GH_TYPE }} ${{ env.GIT_VER }}" \
          $( [[ "${{ env.GH_TYPE }}" == "Release Candidate" ]] && echo "--prerelease" ) \
          *.zip version.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
